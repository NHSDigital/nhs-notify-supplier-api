name: "Acceptance stage"

on:
  workflow_call:
    inputs:
      build_datetime:
        description: "Build datetime, set by the CI/CD pipeline workflow"
        required: true
        type: string
      build_timestamp:
        description: "Build timestamp, set by the CI/CD pipeline workflow"
        required: true
        type: string
      build_epoch:
        description: "Build epoch, set by the CI/CD pipeline workflow"
        required: true
        type: string
      nodejs_version:
        description: "Node.js version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      python_version:
        description: "Python version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      terraform_version:
        description: "Terraform version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      version:
        description: "Version of the software, set by the CI/CD pipeline workflow"
        required: true
        type: string
      pr_number:
        required: true
        type: string
      proxy_deployed:
        description: "True if the APIM proxy was deployed"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  run-e2e-tests:
    name: Run End-to-End Tests
    runs-on: ubuntu-latest
    if: inputs.proxy_deployed == 'true'
    steps:
      - uses: actions/checkout@v5.0.0

      - name: "Run e2e tests"
        #uses: ./.github/actions/e2e-tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NON_PROD_API_KEY: ${{ secrets.NON_PROD_API_KEY }}
          INTERNAL_DEV_TEST_PEM: ${{ secrets.INTERNAL_DEV_TEST_PEM }}
        shell: bash
        run: |
          echo "E2E tests are currently disabled. See CCM-14778"
