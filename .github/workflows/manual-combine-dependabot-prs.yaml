name: Combine Dependabot PRs

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  combine-prs:
    runs-on: ubuntu-latest

    steps:
      - name: combine-prs
        id: combine-prs
        uses: NHSDigital/nhs-notify-shared-modules/.github/actions/combine-dependabot-prs@4.0.6
        with:
          ci_required: false
          labels: dependencies
          pr_title: "CCM-9336: Combined Dependabot PRs"
          combine_branch_name: dependabotCombined
          pr_body_header: "CCM-9336: Combined Dependabot PRs"
